<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rezerwacje</title>
</head>
<body>

<h2>Logowanie</h2>

<input id="username" placeholder="login">
<input id="password" type="password" placeholder="hasło">
<button onclick="login()">Zaloguj</button>

<hr>

<h2>Dodaj rezerwację</h2>

<input id="name" placeholder="Imię">
<input id="date" placeholder="Data (YYYY-MM-DD)">
<input id="time" placeholder="Godzina (HH:MM)">
<input id="guests" placeholder="Liczba gości">
<button onclick="addReservation()">Dodaj</button>

<hr>

<h2>Twoje rezerwacje</h2>
<button onclick="getReservations()">Pobierz</button>

<ul id="list"></ul>

<script>
let token = "";

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const formData = new URLSearchParams();
    formData.append("username", username);
    formData.append("password", password);

    const res = await fetch("http://localhost:8000/login", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    console.log("LOGIN RESPONSE:", data);

    token = data.access_token;

    console.log("TOKEN:", token);

    if (token) {
        alert("Zalogowano!");
    } else {
        alert("Błąd logowania!");
    }
}

async function addReservation() {
    if (!token) {
        alert("Najpierw się zaloguj!");
        return;
    }

    const res = await fetch("http://localhost:8000/reservations", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            customer_name: document.getElementById("name").value,
            reservation_date: document.getElementById("date").value,
            reservation_time: document.getElementById("time").value,
            guests_count: parseInt(document.getElementById("guests").value)
        })
    });

    const data = await res.json();
    console.log("ADD RESPONSE:", data);

    if (res.status === 200 || res.status === 201) {
        alert("Dodano rezerwację!");
    } else {
        alert("Błąd: " + JSON.stringify(data));
    }
}

async function getReservations() {
    if (!token) {
        alert("Najpierw się zaloguj!");
        return;
    }

    const res = await fetch("http://localhost:8000/reservations", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    console.log("LIST RESPONSE:", data);

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(r => {
        const li = document.createElement("li");
        li.innerText = r.customer_name + " | " + r.reservation_date + " | " + r.guests_count;

        const btn = document.createElement("button");
        btn.innerText = "Usuń";
        btn.onclick = () => deleteReservation(r.id);

        li.appendChild(btn);
        list.appendChild(li);
    });
}

async function deleteReservation(id) {
    if (!token) {
        alert("Najpierw się zaloguj!");
        return;
    }

    const res = await fetch(`http://localhost:8000/reservations/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    console.log("DELETE RESPONSE:", data);

    getReservations();
}
</script>

</body>
</html>
